const $ = (id) => document.getElementById(id);

onAuthStateChanged(auth, async (user) => {

function renderTabs() {
  const row = $('tab-row');
  row.innerHTML = '';
  PROGRAMS.forEach((p) => {
    const pill = document.createElement('div');
    pill.className = 'tab-pill';
    pill.textContent = p.tabLabel;
    pill.dataset.id = p.id;
    pill.addEventListener('click', () => selectProgram(p.id));
    row.appendChild(pill);
  });
}

function selectProgram(id) {
  document.querySelectorAll('.tab-pill').forEach((el) => el.classList.toggle('active', el.dataset.id === id));
  const program = PROGRAMS.find((p) => p.id === id);
  const wrap = $('program-content');
  wrap.innerHTML = '';

  const titleEl = document.createElement('h2');
  titleEl.style.marginBottom = '2px';
  titleEl.textContent = program.title;
  wrap.appendChild(titleEl);

  if (program.subtitle) {
    const sub = document.createElement('p');
    sub.className = 'program-subtitle';
    sub.textContent = program.subtitle;
    wrap.appendChild(sub);
  } else {
    wrap.appendChild(document.createElement('div')).style.marginBottom = '18px';
  }

  program.days.forEach((day) => {
    const block = document.createElement('div');
    block.className = 'day-block card';
    const h3 = document.createElement('h3');
    h3.textContent = day.label;
    block.appendChild(h3);

    const tableWrap = document.createElement('div');
    tableWrap.className = 'table-wrap';
    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th style="width:36px;">#</th><th>Bài tập / Nhóm chuyển động</th><th>Sets×Reps @RIR</th></tr></thead>`;
    const tbody = document.createElement('tbody');
    day.slots.forEach(([n, exercise, rx]) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${n}</td><td>${escapeHtml(exercise)}</td><td>${escapeHtml(rx)}</td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    tableWrap.appendChild(table);
    block.appendChild(tableWrap);
    wrap.appendChild(block);
  });

  const notesCard = document.createElement('div');
  notesCard.className = 'card notes-card';
  notesCard.innerHTML = `<h3>Ghi chú</h3><p class="notes-lang-hint">Giữ nguyên văn tiếng Anh từ sách gốc.</p>`;
  const ol = document.createElement('ol');
  program.notes.forEach((note) => {
    const li = document.createElement('li');
    li.textContent = note;
    ol.appendChild(li);
  });
  notesCard.appendChild(ol);
  wrap.appendChild(notesCard);
}

function escapeHtml(str) { return String(str ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
